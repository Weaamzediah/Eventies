name: Eventies CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-files:
    name: Check Repository Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List project files
        run: |
          echo "Eventies Repository Files:"
          ls -la
          echo "Pipeline completed successfully!"

      - name: Verify branch 11 file
        run: |
          if [ -f "RequestStrategy.ts" ]; then
            echo "RequestStrategy.ts found - Branch 11 OK"
          else
            echo "RequestStrategy.ts not found"
          fi

      - name: Verify branch 14 file
        run: |
          if [ -f "RentalCart2.tsx" ]; then
            echo "RentalCart2.tsx found - Branch 14 OK"
          else
            echo "RentalCart2.tsx not found"
          fi
